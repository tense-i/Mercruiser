name: Electron Build

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: electron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            flag: --win
          - os: macos-latest
            flag: --mac
          - os: ubuntu-latest
            flag: --linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npm run electron:dist${{ matrix.os == 'windows-latest' && ':win' || matrix.os == 'macos-latest' && ':mac' || ':linux' }}
        env:
          # Supply dummy values — app ships in mock AI mode by default
          OPENAI_API_KEY: dummy
          SILICONFLOW_API_KEY: dummy
          GOOGLE_GENERATIVE_AI_API_KEY: dummy
          # electron-builder code-signing (optional — skip if secrets not set)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mercruiser-studio-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.zip
          if-no-files-found: warn
          retention-days: 14
